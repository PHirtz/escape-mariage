<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>💐 Le Grand Quizz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ===== VARIABLES — Thème Sauge & Eucalyptus ===== */
    :root {
      --sage:       #6b8f71;
      --sage-light: #8aad90;
      --sage-dim:   #a8c4ac;
      --ink:        #2a3a2d;
      --ink-dim:    #4d6652;
      --bg:         #f3f7f2;
      --card-bg:    rgba(247, 252, 247, 0.92);
      --success:    #5a9e6a;
      --error:      #c96060;
      --radius:     18px;
      --accent:     #8aad90;
      --border:     rgba(107, 143, 113, 0.30);
    }

    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    input, textarea { cursor: text; user-select: text; }

    body {
      font-family: 'Cormorant Garamond', serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== FOND AQUARELLE — tons verts / eucalyptus ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 10%, rgba(168,210,175,0.45), transparent 60%),
        radial-gradient(ellipse 60% 50% at 90%  5%, rgba(195,225,195,0.40), transparent 55%),
        radial-gradient(ellipse 50% 40% at 80% 85%, rgba(175,210,185,0.40), transparent 55%),
        radial-gradient(ellipse 70% 50% at 15% 90%, rgba(195,220,200,0.35), transparent 60%),
        radial-gradient(ellipse 40% 35% at 50% 50%, rgba(220,235,215,0.25), transparent 70%),
        linear-gradient(160deg, #eef5ec 0%, #f3f8f2 40%, #ecf4ea 100%);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 30% 20% at  5% 30%, rgba(160,200,165,0.25), transparent 70%),
        radial-gradient(ellipse 25% 18% at 95% 55%, rgba(185,215,180,0.22), transparent 70%),
        radial-gradient(ellipse 20% 15% at 40% 75%, rgba(195,220,195,0.20), transparent 70%),
        radial-gradient(ellipse 18% 22% at 70% 20%, rgba(210,230,195,0.20), transparent 70%);
      pointer-events: none;
    }

    /* ===== PÉTALES ===== */
    .petals-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .petal {
      position: absolute;
      opacity: 0;
      animation: fall linear infinite;
      filter: sepia(0.4) hue-rotate(60deg) brightness(0.75);
    }
    @keyframes fall {
      0%   { opacity: 0;    transform: translateY(-30px) rotate(0deg); }
      10%  { opacity: 0.45; }
      90%  { opacity: 0.15; }
      100% { opacity: 0;    transform: translateY(110vh) rotate(540deg) translateX(30px); }
    }

    /* ===== LAYOUT ===== */
    .app {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
      padding: 24px 16px 48px;
    }

    /* ============ ÉCRAN D'ACCUEIL ============ */
    #welcome {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 36px 40px;
      box-shadow:
        0 8px 40px rgba(80, 130, 90, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      animation: fadeUp 0.6s ease both;
    }

    .welcome-deco { text-align: center; margin-bottom: 28px; }

    .welcome-rings {
      font-size: 44px;
      display: block;
      margin-bottom: 12px;
      animation: sway 4s ease-in-out infinite;
    }
    @keyframes sway {
      0%, 100% { transform: rotate(-6deg) scale(1); }
      50%       { transform: rotate(6deg)  scale(1.05); }
    }

    .welcome-names {
      font-family: 'Cinzel', serif;
      font-size: 1.7rem;
      font-weight: 400;
      color: var(--sage);
      letter-spacing: 0.08em;
      line-height: 1.2;
    }
    .welcome-names em {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--sage-light);
      font-size: 2rem;
      font-weight: 300;
    }

    .welcome-amp {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      color: var(--sage-dim);
      font-size: 1.5rem;
      display: block;
      margin: 4px 0;
    }

    .welcome-subtitle {
      text-align: center;
      color: var(--ink-dim);
      font-size: 0.85rem;
      font-style: italic;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 32px;
      opacity: 0.7;
    }

    .welcome-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .welcome-divider::before,
    .welcome-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border));
    }
    .welcome-divider::after { background: linear-gradient(to left, transparent, var(--border)); }
    .welcome-divider span { font-size: 16px; color: var(--sage-dim); }

    .team-label-text {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sage-dim);
      margin-bottom: 8px;
    }

    #teamName {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(247, 252, 247, 0.85);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 16px;
    }
    #teamName::placeholder { color: var(--sage-dim); font-style: italic; opacity: 0.7; }
    #teamName:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(138, 173, 144, 0.18);
    }

    .btn-start {
      width: 100%;
      padding: 15px;
      border: 1px solid rgba(107, 143, 113, 0.4);
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(107,143,113,0.14), rgba(138,173,144,0.10));
      color: var(--sage);
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-start:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(107, 143, 113, 0.22);
      transform: translateY(-1px);
    }
    .btn-start:active { transform: scale(0.98); }

    /* ============ JEU PRINCIPAL ============ */
    #main { display: none; }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 400;
      color: var(--sage);
      letter-spacing: 0.12em;
    }

    #progressText {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--ink-dim);
      opacity: 0.8;
    }

    #teamLabel {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      color: var(--sage);
      margin-bottom: 4px;
      padding: 4px 12px;
      border: 1px solid rgba(107, 143, 113, 0.3);
      border-radius: 20px;
      background: rgba(107, 143, 113, 0.07);
    }

    #scoreDisplay {
      display: inline-block;
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      color: var(--sage);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: rgba(247, 252, 247, 0.65);
      margin-bottom: 12px;
    }

    .progress-track {
      height: 2px;
      background: var(--border);
      border-radius: 4px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(to right, var(--sage-dim), var(--sage-light));
      border-radius: 4px;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* ===== CARTE ===== */
    .card {
      background: var(--card-bg);
      border: 1px solid rgba(107, 143, 113, 0.22);
      border-radius: 24px;
      padding: 32px 28px;
      box-shadow:
        0 8px 40px rgba(80, 130, 90, 0.12),
        0 2px 8px rgba(80, 130, 90, 0.07),
        inset 0 1px 0 rgba(255, 255, 255, 0.85);
      position: relative;
      overflow: hidden;
      transition: opacity 0.4s, transform 0.4s;
      backdrop-filter: blur(10px);
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(107,143,113,0.5), transparent);
    }
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(107,143,113,0.05), transparent 60%);
      pointer-events: none;
    }

    .card.hidden  { opacity: 0; transform: translateY(20px); }
    .card.success { animation: glow-success 0.6s ease; }
    .card.error   { animation: shake 0.35s ease; }

    @keyframes glow-success {
      0%,100% { box-shadow: 0 8px 40px rgba(80,130,90,0.12); }
      50%      { box-shadow: 0 0 50px rgba(90,158,106,0.35), 0 8px 40px rgba(80,130,90,0.1); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-8px); }
      40%,80% { transform: translateX(8px); }
    }

    #lock {
      font-size: 2.4rem;
      text-align: center;
      display: block;
      margin-bottom: 16px;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.1));
    }
    #lock.unlocked {
      filter: drop-shadow(0 0 12px var(--success));
      transform: rotate(15deg) scale(1.1);
    }

    #title {
      font-family: 'Cinzel', serif;
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--sage);
      letter-spacing: 0.08em;
      text-align: center;
      margin-bottom: 10px;
    }

    #description {
      font-size: 1.05rem;
      font-style: italic;
      color: var(--ink-dim);
      opacity: 0.85;
      text-align: center;
      line-height: 1.65;
      margin-bottom: 4px;
    }

    #feedback {
      min-height: 22px;
      margin-top: 12px;
      font-size: 0.95rem;
      font-style: italic;
      text-align: center;
      color: var(--error);
      letter-spacing: 0.05em;
    }

    /* ===== AIDE QUIZ ===== */
    .quiz-help {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--sage);
      text-align: center;
      margin: 12px 0;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(107, 143, 113, 0.07);
      border: 1px dashed rgba(107, 143, 113, 0.38);
      letter-spacing: 0.03em;
      width: 100%;
    }

    /* ===== INPUT QUIZ ===== */
    #gameContent input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(247, 252, 247, 0.85);
      color: var(--ink);
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      outline: none;
      box-sizing: border-box;
      margin-top: 16px;
      margin-bottom: 4px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #gameContent input[type="text"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(138, 173, 144, 0.18);
    }
    #gameContent input[type="text"]::placeholder {
      color: var(--sage-dim);
      font-style: italic;
      opacity: 0.7;
    }

    /* ===== BOUTONS ===== */
    button {
      width: 100%;
      margin-top: 12px;
      padding: 14px;
      border: 1px solid rgba(107, 143, 113, 0.38);
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(107,143,113,0.12), rgba(138,173,144,0.08));
      color: var(--sage);
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.3s;
    }
    button:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 20px rgba(107, 143, 113, 0.22);
      transform: translateY(-1px);
    }
    button:active { transform: scale(0.98); }

    #validateBtn { display: none; }

    .btn-reset {
      background: transparent !important;
      border: 1px dashed var(--border) !important;
      color: var(--ink-dim) !important;
      box-shadow: none !important;
      font-family: 'Cormorant Garamond', serif !important;
      font-style: italic;
      font-size: 0.85rem !important;
      padding: 10px !important;
      margin-top: 8px !important;
      opacity: 0.5;
    }
    .btn-reset:hover { opacity: 0.9 !important; transform: none !important; }

    /* ===== MEMORY ===== */
    .memory-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 16px;
      width: 100%;
    }
    .memory-cell {
      aspect-ratio: 1;
      background: rgba(247, 252, 247, 0.75);
      border: 1px solid rgba(107, 143, 113, 0.22);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      cursor: pointer;
      transition: all 0.25s;
      user-select: none;
    }
    .memory-cell:hover {
      border-color: var(--accent);
      transform: scale(1.04);
      box-shadow: 0 2px 8px rgba(107, 143, 113, 0.18);
    }
    .memory-cell.flipped {
      background: rgba(220, 240, 225, 0.9);
      border-color: rgba(107, 143, 113, 0.5);
    }
    .memory-cell.matched {
      background: rgba(90, 158, 106, 0.12);
      border-color: var(--success);
      cursor: default;
      animation: matchPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes matchPop {
      0%   { transform: scale(1); }
      60%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* ===== PUZZLE ===== */
    .puzzle-container {
      display: flex;
      flex-wrap: wrap;
      margin: 16px auto 0;
      justify-content: center;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(80, 130, 90, 0.14);
    }
    .puzzle-piece {
      cursor: pointer;
      box-sizing: border-box;
      background-repeat: no-repeat;
      border: 1px solid rgba(107, 143, 113, 0.18);
      transition: filter 0.2s, border-color 0.2s;
      user-select: none;
    }
    .puzzle-piece:hover { filter: brightness(1.06); border-color: var(--accent); }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- Pétales décoratives -->
<div class="petals-bg" id="petalsBg"></div>

<div class="app">

  <!-- Écran d'accueil -->
  <div id="welcome">
    <div class="welcome-deco">
      <span class="welcome-rings">💐</span>
      <div class="welcome-names">
        <em>Clémence</em>
        <span class="welcome-amp">&amp;</span>
        <em>Alex</em>
      </div>
    </div>

    <p class="welcome-subtitle">Le grand quizz des invités</p>

    <div class="welcome-divider"><span>✦</span></div>

    <span class="team-label-text">Votre équipe</span>
    <input id="teamName" type="text" placeholder="Nom de l'équipe...">
    <button class="btn-start" onclick="startGame()">Commencer &rarr;</button>
  </div>

  <!-- Jeu principal -->
  <div id="main">
    <header>
      <h1>💐 Quizz</h1>
      <span id="progressText"></span>
    </header>
    <div id="teamLabel"></div>
    <div id="scoreDisplay"></div>

    <div class="progress-track">
      <div id="progressBar" class="progress-fill"></div>
    </div>

    <div class="card" id="card">
      <span id="lock" class="locked">🔒</span>
      <h2 id="title"></h2>
      <p id="description"></p>
      <div id="gameContent"></div>
      <button onclick="validate()" id="validateBtn">🔓 Déverrouiller</button>
      <p id="feedback"></p>
    </div>
  </div>

</div>

<script>
  // Pétales — thème mariage & botanique
  (function spawnPetals() {
    const symbols = ["💐","🌸","🌹","🌷","🍃","🌿","🕊️","✨","🌾","💌"];
    const container = document.getElementById("petalsBg");
    for (let i = 0; i < 18; i++) {
      const p = document.createElement("div");
      p.classList.add("petal");
      p.innerText               = symbols[Math.floor(Math.random() * symbols.length)];
      p.style.left              = Math.random() * 100 + "vw";
      p.style.animationDuration = (9 + Math.random() * 10) + "s";
      p.style.animationDelay    = (Math.random() * 15) + "s";
      p.style.fontSize           = (0.8 + Math.random() * 1) + "rem";
      container.appendChild(p);
    }
  })();
</script>
<script src="game.js" defer></script>
</body>
</html>
